<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Fenris Wolf + Moon Logo (classic Space Wolves inspired) -->
  
  <!-- Crescent Moon (behind the wolf) -->
  <path 
    d="M72 18 
       A 26 26 0 1 0 72 82 
       A 20 20 0 1 1 72 18 Z" 
    fill="#c5a46e" 
    opacity="0.9"/>
  
  <!-- Wolf Head (howling / profile style) -->
  <!-- Main head shape -->
  <path 
    d="M28 35 
       Q22 48 26 62 
       Q32 78 48 76 
       Q55 82 62 74 
       Q70 68 68 52 
       Q72 38 62 30 
       Q50 22 38 26 
       Q30 30 28 35 Z" 
    fill="#c5a46e"/>
  
  <!-- Ear -->
  <path d="M30 32 L20 18 L35 26 Z" fill="#c5a46e"/>
  <path d="M33 29 L24 20 L36 25 Z" fill="#0a0f1a"/>
  
  <!-- Eye -->
  <ellipse cx="42" cy="46" rx="3.5" ry="4.5" fill="#0a0f1a"/>
  
  <!-- Snout / muzzle -->
  <path d="M48 52 Q55 58 62 52" fill="none" stroke="#0a0f1a" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="57" cy="57" rx="2.8" ry="1.8" fill="#0a0f1a"/>
  
  <!-- Neck / fur suggestion -->
  <path d="M48 74 Q40 82 52 80" fill="none" stroke="#0a0f1a" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
</svg>
